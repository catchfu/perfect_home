name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      pwa_url:
        description: "Deployed PWA URL"
        required: true
        default: "https://perfect-home-chi.vercel.app"

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  ANDROID_HOME: /usr/local/lib/android/sdk

jobs:
  apk:
    name: Generate APK via Bubblewrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Android SDK
        run: |
          echo "Setting up Android SDK..."
          mkdir -p "$ANDROID_SDK_ROOT"
          cd /tmp
          curl -sL -o cmdline-tools.zip "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          unzip -q -o cmdline-tools.zip -d "$ANDROID_SDK_ROOT"
          mv "$ANDROID_SDK_ROOT/cmdline-tools" "$ANDROID_SDK_ROOT/latest" 2>/dev/null || true
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          mv "$ANDROID_SDK_ROOT/latest" "$ANDROID_SDK_ROOT/cmdline-tools/latest" 2>/dev/null || true
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            --sdk_root="$ANDROID_SDK_ROOT" \
            "platforms;android-34" \
            "build-tools;34.0.0" 2>&1 | tail -5

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build APK
        shell: bash
        run: |
          PWA_URL="${{ github.event.inputs.pwa_url }}"
          MANIFEST="${PWA_URL}/manifest.webmanifest"
          echo "Manifest: $MANIFEST"
          
          export JAVA_HOME=$JAVA_HOME_17_X64
          mkdir -p android-build
          
          echo "--- Bubblewrap init ---"
          echo "n" | npx @bubblewrap/cli init \
            --manifest="$MANIFEST" \
            --directory=./android-build \
            --jdkPath="$JAVA_HOME_17_X64" 2>&1
          
          echo "--- Files after init ---"
          find android-build -type f
          
          if [ -f "android-build/twa-manifest.json" ]; then
            echo "--- Bubblewrap build ---"
            npx @bubblewrap/cli build \
              --directory=./android-build \
              --jdkPath="$JAVA_HOME_17_X64" 2>&1
          fi
          
          echo "--- Final output ---"
          find android-build -type f \( -name "*.apk" -o -name "*.aab" -o -name "*.zip" \) 2>/dev/null || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: perfect-home-apk
          path: android-build/
          retention-days: 30
