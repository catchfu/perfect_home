name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      pwa_url:
        description: "Deployed PWA URL"
        required: true
        default: "https://perfect-home-chi.vercel.app"

jobs:
  apk:
    name: Generate APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Bubblewrap & expect
        run: |
          npm install -g @bubblewrap/cli
          sudo apt-get update -qq && sudo apt-get install -y -qq expect

      - name: Build APK via Bubblewrap
        shell: bash
        run: |
          PWA_URL="${{ github.event.inputs.pwa_url }}"
          export MANIFEST="${PWA_URL}/manifest.webmanifest"

          mkdir -p android-build

          expect << 'EOL'
          set timeout 600
          spawn npx @bubblewrap/cli init \
            --manifest $env(MANIFEST) \
            --directory ./android-build

          expect {JDK} { send "\r" }
          expect {Android SDK} { send "\r" }
          expect {terms} { send "y\r" }
          expect {Package ID} { send "com.perfecthome.app\r" }
          expect {App name} { send "Perfect Home\r" }
          expect {version name} { send "1.0.0\r" }
          expect {version code} { send "1\r" }
          expect eof
          EOL

          echo "--- Init done ---"
          ls -la android-build/

          if [ -f "android-build/twa-manifest.json" ]; then
            echo "--- Building APK ---"
            npx @bubblewrap/cli build --directory=./android-build 2>&1
          fi

          echo "--- Output ---"
          find android-build -type f \( -name "*.apk" -o -name "*.aab" \) 2>/dev/null || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: perfect-home-apk
          path: android-build/
          retention-days: 30
