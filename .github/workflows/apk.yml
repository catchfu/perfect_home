name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      pwa_url:
        description: "Deployed PWA URL"
        required: true
        default: "https://perfect-home-chi.vercel.app"

jobs:
  apk:
    name: Generate APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Android SDK
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          mkdir -p $ANDROID_SDK_ROOT
          cd /tmp
          curl -sL -o cmdline-tools.zip "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          unzip -q -o cmdline-tools.zip
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          mv cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            --sdk_root=$ANDROID_SDK_ROOT \
            "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build APK
        shell: bash
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          PWA_URL="${{ github.event.inputs.pwa_url }}"
          MANIFEST="${PWA_URL}/manifest.webmanifest"
          echo "PWA: $PWA_URL"
          export JAVA_HOME=$JAVA_HOME_17_X64
          mkdir -p android-build

          # Use 'script' to create a pseudo-TTY (Bubblewrap uses inquirer which needs a real TTY)
          # Pipe answers via stdin through the PTY
          echo "--- Bubblewrap init ---"
          ANSWERS="Y
          Y
          y
          com.perfecthome.app
          Perfect Home
          1.0.0
          1
          "
          echo "$ANSWERS" | script -q -c "npx @bubblewrap/cli init --manifest \"$MANIFEST\" --directory ./android-build 2>&1" /dev/null

          echo "--- Files after init ---"
          find android-build -type f | head -15

          if [ -f "android-build/twa-manifest.json" ]; then
            echo "--- Bubblewrap build ---"
            script -q -c "npx @bubblewrap/cli build --directory ./android-build" /dev/null
          else
            echo "ERROR: init failed"
            ls -la android-build/
          fi

          echo "--- APK Output ---"
          find android-build -type f \( -name "*.apk" -o -name "*.aab" \) 2>/dev/null || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: perfect-home-apk
          path: android-build/
          retention-days: 30
          if-no-files-found: warn
