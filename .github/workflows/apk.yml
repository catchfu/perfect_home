name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      pwa_url:
        description: "Deployed PWA URL"
        required: true
        default: "https://perfect-home-chi.vercel.app"

jobs:
  apk:
    name: Generate APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build APK via CloudAPK
        run: |
          PWA_URL="${{ github.event.inputs.pwa_url }}"
          echo "URL: $PWA_URL"

          MANIFEST=$(curl -s "${PWA_URL}/manifest.webmanifest")
          APP_NAME=$(echo "$MANIFEST" | jq -r '.name')
          SHORT_NAME=$(echo "$MANIFEST" | jq -r '.short_name')
          BG_COLOR=$(echo "$MANIFEST" | jq -r '.background_color // "#F5F0EB"')
          THEME_COLOR=$(echo "$MANIFEST" | jq -r '.theme_color // "#2C4A5A"')
          DISPLAY=$(echo "$MANIFEST" | jq -r '.display // "standalone"')
          ORIENTATION=$(echo "$MANIFEST" | jq -r '.orientation // "portrait"')

          PAYLOAD=$(cat <<ENDJSON
          {
            "packageId": "com.perfecthome.app",
            "host": "${PWA_URL}",
            "name": "${APP_NAME}",
            "launcherName": "${SHORT_NAME}",
            "appVersion": "1.0.0.0",
            "appVersionCode": 1,
            "backgroundColor": "${BG_COLOR}",
            "themeColor": "${THEME_COLOR}",
            "navigationColor": "${THEME_COLOR}",
            "splashBackgroundColor": "${BG_COLOR}",
            "display": "${DISPLAY}",
            "orientation": "${ORIENTATION}",
            "startUrl": "/",
            "iconUrl": "${PWA_URL}/icons/icon-512.png",
            "maskableIconUrl": "${PWA_URL}/icons/icon-512.png",
            "webManifestUrl": "${PWA_URL}/manifest.webmanifest",
            "fallbackType": "customtab",
            "signingMode": "none",
            "includeSourceApp": true,
            "features": {}
          }
          ENDJSON
          )

          echo "Submitting to CloudAPK..."
          HTTP_CODE=$(curl -s -o android-build.zip -w "%{http_code}" \
            -X POST "https://pwabuilder-cloudapk.azurewebsites.net/generateAppPackage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "CloudAPK error:"
            cat android-build.zip 2>/dev/null || echo "No response body"
            exit 1
          fi

          mkdir -p android-build
          unzip -o android-build.zip -d android-build/ 2>&1
          echo "--- Output ---"
          ls -la android-build/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: perfect-home-apk
          path: android-build/
          retention-days: 30
          if-no-files-found: warn
