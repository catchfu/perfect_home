name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      pwa_url:
        description: "Deployed PWA URL"
        required: true
        default: "https://perfect-home-chi.vercel.app"

env:
  NODE_VERSION: 20

jobs:
  apk:
    name: Generate APK via CloudAPK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build APK via PWABuilder CloudAPK
        id: build
        run: |
          URL="${{ github.event.inputs.pwa_url }}"
          MANIFEST_URL="${URL}/manifest.webmanifest"
          
          echo "PWA URL: $URL"
          echo "Manifest: $MANIFEST_URL"
          
          # Fetch manifest to extract app details
          MANIFEST=$(curl -s "$MANIFEST_URL")
          APP_NAME=$(echo "$MANIFEST" | jq -r '.name')
          SHORT_NAME=$(echo "$MANIFEST" | jq -r '.short_name')
          BG_COLOR=$(echo "$MANIFEST" | jq -r '.background_color')
          THEME_COLOR=$(echo "$MANIFEST" | jq -r '.theme_color')
          ICON_URL="${URL}/icons/icon-512.png"
          
          echo "App: $APP_NAME"
          
          # Submit to PWABuilder CloudAPK service
          RESPONSE=$(curl -s -X POST "https://pwabuilder-cloudapk.azurewebsites.net/generateAppPackage" \
            -H "Content-Type: application/json" \
            -d "$(cat <<EOF
          {
            "url": "$MANIFEST_URL",
            "host": "$URL",
            "name": "$APP_NAME",
            "shortName": "$SHORT_NAME",
            "appPackage": "com.perfecthome.app",
            "appVersion": "1.0.0.0",
            "appVersionCode": 1,
            "backgroundColor": "$BG_COLOR",
            "themeColor": "$THEME_COLOR",
            "navigationColor": "$THEME_COLOR",
            "splashScreenBackgroundColor": "$BG_COLOR",
            "display": "standalone",
            "orientation": "portrait",
            "iconUrl": "$ICON_URL",
            "maskableIconUrl": "$ICON_URL",
            "launchUrl": "/",
            "signingMode": "unsigned",
            "fallbackType": "customtab",
            "isFullScopeUrl": true,
            "isPackageIdOk": true,
            "includeSourceApp": true,
            "features": {},
            "additionalTrustedOrigins": []
          }
          EOF
          )")
          
          echo "Response:"
          echo "$RESPONSE" | jq .
          
          # Check for download URL
          DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '.downloadUrl // .zipUrl // empty')
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            echo "No download URL found. Checking full response..."
            echo "$RESPONSE" | jq -r 'keys | .[]' | while read key; do
              echo "  $key: $(echo "$RESPONSE" | jq -r ".[$key]")"
            done
            exit 1
          fi
          
          echo "download_url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT

      - name: Download APK
        run: |
          DOWNLOAD_URL="${{ steps.build.outputs.download_url }}"
          mkdir -p android-build
          
          echo "Downloading from: $DOWNLOAD_URL"
          curl -s -L -o android-build/perfect-home.zip "$DOWNLOAD_URL"
          
          if [ -f android-build/perfect-home.zip ]; then
            ls -lh android-build/
            unzip -o android-build/perfect-home.zip -d android-build/
            ls -lh android-build/
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: perfect-home-apk
          path: android-build/
          retention-days: 30
