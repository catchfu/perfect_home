name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      pwa_url:
        description: "Deployed PWA URL"
        required: true
        default: "https://perfect-home-chi.vercel.app"

jobs:
  apk:
    name: Generate APK via Bubblewrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build APK
        shell: bash
        run: |
          PWA_URL="${{ github.event.inputs.pwa_url }}"
          MANIFEST="${PWA_URL}/manifest.webmanifest"
          echo "Manifest: $MANIFEST"
          
          mkdir -p android-build
          
          echo "--- Bubblewrap init ---"
          # Answer all Bubblewrap prompts: Y for JDK/SDK install, y for ToS
          yes "y" | npx @bubblewrap/cli init \
            --manifest="$MANIFEST" \
            --directory=./android-build 2>&1
          
          echo "--- Files after init ---"
          find android-build -type f
          
          if [ -f "android-build/twa-manifest.json" ]; then
            echo "--- Bubblewrap build ---"
            npx @bubblewrap/cli build \
              --directory=./android-build 2>&1
          fi
          
          echo "--- Final output ---"
          find android-build -type f \( -name "*.apk" -o -name "*.aab" -o -name "*.zip" \) 2>/dev/null || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: perfect-home-apk
          path: android-build/
          retention-days: 30
